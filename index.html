<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCityAI - Helmet Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f3ff;
        }
        
        .upload-section.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #333;
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .file-list {
            margin-bottom: 30px;
        }
        
        .file-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-name {
            color: #333;
            font-weight: 500;
        }
        
        .file-size {
            color: #999;
            font-size: 0.9em;
        }
        
        .results {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .result-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-stat {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.95em;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: 600;
            color: #333;
        }
        
        .helmet-stat {
            color: #22c55e;
        }
        
        .violation-stat {
            color: #ef4444;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
        }
        
        .error.show {
            display: block;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #3c3;
        }
        
        .success.show {
            display: block;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 SafeCityAI</h1>
            <p>Helmet Detection & Traffic Violation Analysis</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('image')">📸 Single Image</button>
            <button class="tab" onclick="switchTab('batch')">📁 Batch Upload</button>
        </div>
        
        <div id="image" class="tab-content active">
            <div class="upload-section" id="imageDropZone" ondrop="handleImageDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" onclick="document.getElementById('imageInput').click()">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Drag & drop image here</div>
                <div class="upload-subtext">or click to browse (JPG, PNG, BMP)</div>
            </div>
            <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
            
            <div id="imageError" class="error"></div>
            <div id="imageSuccess" class="success"></div>
            
            <button class="btn-primary" onclick="uploadImage()" id="uploadImageBtn" disabled>
                Analyze Image
            </button>
            
            <div id="imageLoading" class="loading">
                <span class="spinner"></span>
                Analyzing image...
            </div>
            
            <div id="imageResults" class="results"></div>
        </div>
        
        <div id="batch" class="tab-content">
            <div class="upload-section" id="batchDropZone" ondrop="handleBatchDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" onclick="document.getElementById('batchInput').click()">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Drag & drop multiple images here</div>
                <div class="upload-subtext">or click to browse</div>
            </div>
            <input type="file" id="batchInput" accept="image/*" multiple onchange="handleBatchSelect(event)">
            
            <div id="batchError" class="error"></div>
            <div id="batchSuccess" class="success"></div>
            
            <div class="file-list" id="fileList"></div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="uploadBatch()" id="uploadBatchBtn" disabled>
                    Analyze All
                </button>
                <button class="btn-secondary" onclick="clearBatch()">
                    Clear
                </button>
            </div>
            
            <div id="batchLoading" class="loading">
                <span class="spinner"></span>
                Processing images...
            </div>
            
            <div id="batchResults" class="results"></div>
        </div>
    </div>
    
    <script>
        let selectedImage = null;
        let selectedFiles = [];
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        }
        
        function handleDragLeave(e) {
            e.currentTarget.classList.remove('dragover');
        }
        
        function handleImageDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('imageInput').files = files;
                handleImageSelect({ target: document.getElementById('imageInput') });
            }
        }
        
        function handleBatchDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('batchInput').files = files;
                handleBatchSelect({ target: document.getElementById('batchInput') });
            }
        }
        
        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (file) {
                selectedImage = file;
                document.getElementById('uploadImageBtn').disabled = false;
                clearMessage('imageError');
                clearMessage('imageSuccess');
            }
        }
        
        function handleBatchSelect(e) {
            selectedFiles = Array.from(e.target.files);
            updateFileList();
            document.getElementById('uploadBatchBtn').disabled = selectedFiles.length === 0;
            clearMessage('batchError');
            clearMessage('batchSuccess');
        }
        
        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            selectedFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${(file.size / 1024).toFixed(2)} KB</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }
        
        async function uploadImage() {
            if (!selectedImage) return;
            
            showLoading('imageLoading');
            clearMessage('imageError');
            clearMessage('imageSuccess');
            document.getElementById('imageResults').classList.remove('show');
            
            const formData = new FormData();
            formData.append('file', selectedImage);
            
            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayImageResults(data);
                    showMessage('imageSuccess', `✅ Analysis complete for ${data.filename}`);
                } else {
                    showMessage('imageError', `❌ Error: ${data.detail}`);
                }
            } catch (error) {
                showMessage('imageError', `❌ Error: ${error.message}`);
            } finally {
                hideLoading('imageLoading');
            }
        }
        
        async function uploadBatch() {
            if (selectedFiles.length === 0) return;
            
            showLoading('batchLoading');
            clearMessage('batchError');
            clearMessage('batchSuccess');
            document.getElementById('batchResults').classList.remove('show');
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });
            
            try {
                const response = await fetch('http://127.0.0.1:8000/predict-batch', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayBatchResults(data);
                    showMessage('batchSuccess', `✅ Processed ${data.processed_files} images`);
                } else {
                    showMessage('batchError', `❌ Error: ${data.detail}`);
                }
            } catch (error) {
                showMessage('batchError', `❌ Error: ${error.message}`);
            } finally {
                hideLoading('batchLoading');
            }
        }
        
        function displayImageResults(data) {
            const results = document.getElementById('imageResults');
            results.innerHTML = `
                <div class="result-item">
                    <div class="result-title">📊 Analysis Results</div>
                    <div class="result-stat">
                        <span class="stat-label">Total Detections:</span>
                        <span class="stat-value">${data.total_detections}</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-label">✅ Helmets:</span>
                        <span class="stat-value helmet-stat">${data.helmets} (${data.helmet_percentage}%)</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-label">❌ Violations:</span>
                        <span class="stat-value violation-stat">${data.violations} (${data.violation_percentage}%)</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-label">Model:</span>
                        <span class="stat-value">${data.model}</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-label">Device:</span>
                        <span class="stat-value">${data.device}</span>
                    </div>
                </div>
            `;
            results.classList.add('show');
        }
        
        function displayBatchResults(data) {
            const results = document.getElementById('batchResults');
            let html = `<div class="result-item">
                <div class="result-title">📊 Batch Results - ${data.processed_files}/${data.total_files} files</div>
            </div>`;
            
            data.results.forEach((result, index) => {
                html += `
                    <div class="result-item">
                        <div class="result-title">${index + 1}. ${result.filename}</div>
                        ${result.error ? `<div style="color: red;">Error: ${result.error}</div>` : `
                            <div class="result-stat">
                                <span class="stat-label">Detections:</span>
                                <span class="stat-value">${result.total_detections}</span>
                            </div>
                            <div class="result-stat">
                                <span class="stat-label">Helmets:</span>
                                <span class="stat-value helmet-stat">${result.helmets}</span>
                            </div>
                            <div class="result-stat">
                                <span class="stat-label">Violations:</span>
                                <span class="stat-value violation-stat">${result.violations}</span>
                            </div>
                        `}
                    </div>
                `;
            });
            
            results.innerHTML = html;
            results.classList.add('show');
        }
        
        function clearBatch() {
            selectedFiles = [];
            document.getElementById('batchInput').value = '';
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('uploadBatchBtn').disabled = true;
            document.getElementById('batchResults').classList.remove('show');
            clearMessage('batchError');
            clearMessage('batchSuccess');
        }
        
        function showLoading(id) {
            document.getElementById(id).classList.add('show');
        }
        
        function hideLoading(id) {
            document.getElementById(id).classList.remove('show');
        }
        
        function showMessage(id, message) {
            const element = document.getElementById(id);
            element.textContent = message;
            element.classList.add('show');
        }
        
        function clearMessage(id) {
            const element = document.getElementById(id);
            element.textContent = '';
            element.classList.remove('show');
        }
    </script>
</body>
</html>
