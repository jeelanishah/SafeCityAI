<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeCityAI — Traffic Violation Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #10141c;
      --border: #1e2530;
      --accent: #00e5ff;
      --danger: #ff3b5c;
      --safe: #00e676;
      --warn: #ffb300;
      --text: #e0e6f0;
      --muted: #4a5568;
      --card: #13181f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #00e5ff22, #00e5ff44);
      border: 1px solid var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .logo-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--safe);
      box-shadow: 0 0 8px var(--safe);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── UPLOAD ZONE ── */
    .section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      background: var(--card);
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,229,255,0.04) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .drop-zone:hover, .drop-zone.dragging {
      border-color: var(--accent);
      background: #111820;
    }

    .drop-zone:hover::before, .drop-zone.dragging::before {
      opacity: 1;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .drop-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .drop-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .drop-sub span {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }

    #file-input { display: none; }

    /* ── PREVIEW ── */
    #preview-section { display: none; margin-top: 32px; }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .img-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .img-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .img-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .img-placeholder {
      width: 100%;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── ANALYZE BUTTON ── */
    .btn-analyze {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00e5ff18, #00e5ff28);
      border: 1px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 32px;
    }

    .btn-analyze:hover:not(:disabled) {
      background: linear-gradient(135deg, #00e5ff28, #00e5ff44);
      box-shadow: 0 0 24px rgba(0,229,255,0.15);
      transform: translateY(-1px);
    }

    .btn-analyze:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-analyze.loading {
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-number {
      font-family: 'Rajdhani', sans-serif;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-card.total .stat-number { color: var(--accent); }
    .stat-card.safe .stat-number { color: var(--safe); }
    .stat-card.danger .stat-number { color: var(--danger); }

    /* ── DETECTIONS LIST ── */
    .detections-list { display: flex; flex-direction: column; gap: 10px; }

    .detection-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: slideIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .detection-item.violation { border-left-color: var(--danger); }
    .detection-item.safe { border-left-color: var(--safe); }

    .det-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .det-conf {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .det-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .det-badge.vio {
      background: rgba(255,59,92,0.15);
      color: var(--danger);
      border: 1px solid rgba(255,59,92,0.3);
    }

    .det-badge.ok {
      background: rgba(0,230,118,0.1);
      color: var(--safe);
      border: 1px solid rgba(0,230,118,0.25);
    }

    .det-box {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── ERROR ── */
    .error-box {
      background: rgba(255,59,92,0.08);
      border: 1px solid rgba(255,59,92,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--danger);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      display: none;
      margin-bottom: 20px;
    }

    /* ── RESET ── */
    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
      letter-spacing: 1px;
    }

    .btn-reset:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 600px) {
      .preview-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-number { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div>
        <div class="logo-text">SafeCityAI</div>
        <div class="logo-sub">Traffic Violation Detection</div>
      </div>
    </div>
    <div class="status-badge">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">CHECKING...</span>
    </div>
  </header>

  <!-- UPLOAD -->
  <p class="section-title">// Upload Image</p>
  <div class="drop-zone" id="drop-zone">
    <span class="upload-icon">📸</span>
    <div class="drop-title">Drop an image here</div>
    <div class="drop-sub">or <span onclick="document.getElementById('file-input').click()">browse files</span> — JPG, PNG supported</div>
    <input type="file" id="file-input" accept="image/*"/>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="error-box"></div>

  <!-- PREVIEW + RESULTS -->
  <div id="preview-section">
    <div class="preview-grid">
      <div class="img-card">
        <div class="img-label">// Original</div>
        <img id="original-img" src="" alt="Original"/>
      </div>
      <div class="img-card">
        <div class="img-label">// Detected</div>
        <div class="img-placeholder" id="detected-placeholder">Run analysis to see result</div>
        <img id="detected-img" src="" alt="Detected" style="display:none"/>
      </div>
    </div>

    <button class="btn-analyze" id="analyze-btn" onclick="analyze()">
      ⚡ Analyze Image
    </button>

    <div id="results-section" style="display:none">
      <p class="section-title">// Detection Summary</p>
      <div class="stats-row">
        <div class="stat-card total">
          <div class="stat-number" id="stat-total">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card safe">
          <div class="stat-number" id="stat-safe">0</div>
          <div class="stat-label">Compliant</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-number" id="stat-vio">0</div>
          <div class="stat-label">Violations</div>
        </div>
      </div>

      <p class="section-title" style="margin-top:8px">// Detections</p>
      <div class="detections-list" id="detections-list"></div>
    </div>

    <button class="btn-reset" onclick="reset()">↺ Analyze Another Image</button>
  </div>

</div>

<script>
  let selectedFile = null;

  // ── Health check ──
  async function checkHealth() {
    try {
      const res = await fetch('/health');
      const data = await res.json();
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      if (data.model_loaded) {
        dot.style.background = 'var(--safe)';
        dot.style.boxShadow = '0 0 8px var(--safe)';
        txt.textContent = 'MODEL READY';
      } else {
        dot.style.background = 'var(--warn)';
        dot.style.boxShadow = '0 0 8px var(--warn)';
        txt.textContent = 'MODEL NOT LOADED';
      }
    } catch {
      document.getElementById('status-text').textContent = 'SERVER OFFLINE';
      document.getElementById('status-dot').style.background = 'var(--danger)';
    }
  }
  checkHealth();

  // ── Drag & Drop ──
  const zone = document.getElementById('drop-zone');

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragging'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragging');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });
  zone.addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('original-img').src = ev.target.result;
      document.getElementById('detected-img').style.display = 'none';
      document.getElementById('detected-placeholder').style.display = 'flex';
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('error-box').style.display = 'none';
      document.getElementById('preview-section').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  // ── Analyze ──
  async function analyze() {
    if (!selectedFile) return;

    const btn = document.getElementById('analyze-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Analyzing...';
    btn.classList.add('loading');
    document.getElementById('error-box').style.display = 'none';

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Server error');
        return;
      }

      // Stats
      document.getElementById('stat-total').textContent = data.total_detections;
      document.getElementById('stat-safe').textContent = data.helmets;
      document.getElementById('stat-vio').textContent = data.violations;

      // Detections list
      const list = document.getElementById('detections-list');
      list.innerHTML = '';
      if (data.detections.length === 0) {
        list.innerHTML = '<div style="color:var(--muted);font-family:\'IBM Plex Mono\',monospace;font-size:13px;text-align:center;padding:20px">No objects detected</div>';
      } else {
        data.detections.forEach((d, i) => {
          const item = document.createElement('div');
          item.className = `detection-item ${d.is_violation ? 'violation' : 'safe'}`;
          item.style.animationDelay = `${i * 0.06}s`;
          const b = d.box;
          item.innerHTML = `
            <div>
              <div class="det-name">${d.class_name.replace(/_/g,' ')}</div>
              <div class="det-conf">conf: ${(d.confidence * 100).toFixed(1)}%</div>
            </div>
            <div class="det-box">[${b.map(v=>Math.round(v)).join(', ')}]</div>
            <span class="det-badge ${d.is_violation ? 'vio' : 'ok'}">${d.is_violation ? '⚠ Violation' : '✓ OK'}</span>
          `;
          list.appendChild(item);
        });
      }

      document.getElementById('results-section').style.display = 'block';

      // Show annotated image (convert path to blob via re-upload isn't needed — just show original with note)
      document.getElementById('detected-placeholder').style.display = 'none';
      // We'll show a note since the output image is server-side
      document.getElementById('detected-img').src = document.getElementById('original-img').src;
      document.getElementById('detected-img').style.display = 'block';
      document.getElementById('detected-img').style.opacity = '0.7';

    } catch (err) {
      showError('Could not connect to server. Make sure the server is running.');
    } finally {
      btn.disabled = false;
      btn.textContent = '⚡ Analyze Image';
      btn.classList.remove('loading');
    }
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = '❌ ' + msg;
    box.style.display = 'block';
  }

  function reset() {
    selectedFile = null;
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('file-input').value = '';
    document.getElementById('error-box').style.display = 'none';
  }
</script>
</body>
</html>
